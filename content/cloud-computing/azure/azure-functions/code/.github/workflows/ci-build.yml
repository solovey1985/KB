name: CI Build

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'QueueProcessorApp/**'
      - '.github/workflows/ci-build.yml'

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './QueueProcessorApp'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Setup .NET SDK'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Restore dependencies'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet restore

      - name: 'Build solution'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet build --configuration Debug --no-restore

      - name: 'Run unit tests'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet test --configuration Debug --no-build --verbosity normal --logger="trx;LogFileName=test-results.trx"

      - name: 'Upload test results'
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: 'Code quality analysis'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          # Could integrate StyleCop, FxCop, or other analyzers here
          dotnet format --verify-no-changes --verbosity diagnostic

      - name: 'Security scan'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          # Could integrate OWASP dependency check or similar
          dotnet list package --vulnerable
