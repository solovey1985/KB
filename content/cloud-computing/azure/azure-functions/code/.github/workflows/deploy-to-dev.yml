name: Build and Deploy to Development

on:
  push:
    branches:
      - develop
    paths:
      - 'QueueProcessorApp/**'
      - '.github/workflows/deploy-to-dev.yml'

env:
  AZURE_FUNCTIONAPP_NAME: 'queue-processor-dev'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './QueueProcessorApp'
  NODE_VERSION: '20.x'
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: 'Setup .NET SDK'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Restore NuGet packages'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet restore

      - name: 'Build function app'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet build --configuration Release --output ./build_artifacts

      - name: 'Run tests'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet test --configuration Release --no-build

      - name: 'Package function app'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet publish -c Release -o ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/publish

      - name: 'Upload artifact'
        uses: actions/upload-artifact@v3
        with:
          name: function-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 'Download artifact'
        uses: actions/download-artifact@v3
        with:
          name: function-app
          path: ./publish

      - name: 'Login to Azure'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_DEV }}

      - name: 'Post deployment health check'
        run: |
          echo "Deployment completed for ${{ env.AZURE_FUNCTIONAPP_NAME }}"
          # Add your health check endpoint here
