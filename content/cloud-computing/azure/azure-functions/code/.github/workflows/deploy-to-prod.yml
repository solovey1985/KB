name: Build and Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'QueueProcessorApp/**'
      - '.github/workflows/deploy-to-prod.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'queue-processor-prod'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './QueueProcessorApp'
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: 'Setup .NET SDK'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Restore NuGet packages'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet restore

      - name: 'Build function app'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet build --configuration Release --output ./build_artifacts

      - name: 'Run tests'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet test --configuration Release --no-build --logger="trx;LogFileName=test-results.trx"

      - name: 'Publish test results'
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/test-results.trx'

      - name: 'Code quality check'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          # Add code quality tools like SonarQube here if needed

      - name: 'Package function app'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          dotnet publish -c Release -o ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/publish

      - name: 'Upload artifact'
        uses: actions/upload-artifact@v3
        with:
          name: function-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/publish
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    
    steps:
      - name: 'Download artifact'
        uses: actions/download-artifact@v3
        with:
          name: function-app
          path: ./publish

      - name: 'Login to Azure'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: 'Deploy to Function App'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD }}

      - name: 'Health check'
        run: |
          echo "Production deployment completed for ${{ env.AZURE_FUNCTIONAPP_NAME }}"

      - name: 'Slack notification'
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
