services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver-adventureworkslt
    hostname: sqlserver-adventureworkslt
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-adventureworkslt-data:/var/opt/mssql
      - ./AdventureWorksLT2019.bak:/var/opt/mssql/backup/AdventureWorksLT2019.bak:ro
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  sqlserver-adventureworkslt-data:
    name: sqlserver-adventureworkslt-data
